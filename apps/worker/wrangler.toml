name = "line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# ═══════════════════════════════════════════════════════════════
# デフォルト = テスト環境 (noda@)
# 使い方: npx wrangler deploy
# ═══════════════════════════════════════════════════════════════
account_id = "YOUR_DEV_ACCOUNT_ID"

[assets]
directory = "dist/client"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "YOUR_DEV_D1_DATABASE_ID"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[triggers]
crons = ["*/5 * * * *"]

# ═══════════════════════════════════════════════════════════════
# 本番環境 (aiagent.mini@)
# 使い方: npx wrangler deploy --env production --name your-worker-name
# D1:     npx wrangler d1 execute line-crm --env production --remote --file ...
# ═══════════════════════════════════════════════════════════════
[env.production]
account_id = "fe67ee32ff09d65511ba69bfd049bef5"

[env.production.assets]
directory = "dist/client"
binding = "ASSETS"

[[env.production.d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "0a68f5ef-7ece-4b9a-9837-c3a8e87d9f6f"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[env.production.triggers]
crons = ["*/5 * * * *"]
