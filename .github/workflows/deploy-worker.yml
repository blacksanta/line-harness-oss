name: Deploy Worker

# Configure CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets to enable auto-deploy
on:
  workflow_dispatch:
  push:
    branches: [main, staging]
    paths:
      - 'apps/worker/**'
      - 'packages/db/**'
      - 'packages/shared/**'
      - 'packages/line-sdk/**'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @line-crm/shared --filter @line-crm/line-sdk --filter @line-crm/db build

      - run: pnpm --filter worker build
        env:
          CLOUDFLARE_ENV: ${{ env.DEPLOY_ENV }}
          VITE_LIFF_ID: ${{ env.DEPLOY_ENV == 'staging' && vars.VITE_LIFF_ID_STAGING || vars.VITE_LIFF_ID }}
          VITE_BOT_BASIC_ID: ${{ vars.VITE_BOT_BASIC_ID }}
          VITE_CALENDAR_CONNECTION_ID: ${{ vars.VITE_CALENDAR_CONNECTION_ID }}

      - uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_ENV: ${{ env.DEPLOY_ENV }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy --env ${{ env.DEPLOY_ENV }}
